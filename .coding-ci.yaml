version: 2
env:
  TEAMAI_TEST_TOKEN:
    secret: ${TEAMAI_TEST_TOKEN_SECRET}
  TEAMAI_TEST_REPO_URL:
    secret: ${TEAMAI_TEST_REPO_URL_SECRET}
  NPM_TOKEN:
    secret: ${NPM_TOKEN_SECRET}
stages:
- stage: validate
  tasks:
  - task: lint-and-test
    artifacts:
    - coverage/cobertura-coverage.xml
    cmds:
    - plugin: cmds
      params:
        cmds:
        - node --version && npm --version
        - npm ci --ignore-scripts
        - echo "=== Lint (typecheck) ==="
        - npx tsc --noEmit
        - echo "=== Unit Tests + Coverage ==="
        - npx vitest run --coverage
- stage: build
  tasks:
  - task: build
    artifacts:
    - dist/
    cmds:
    - plugin: cmds
      params:
        cmds:
        - echo "=== Build ==="
        - npm ci --ignore-scripts
        - npm run build
- stage: e2e
  tasks:
  - task: e2e
    cmds:
    - plugin: cmds
      params:
        cmds:
        - echo "=== E2E Tests ==="
        - npm ci --ignore-scripts
        - npm run build
        - "if [ -n \"$TEAMAI_TEST_TOKEN\" ] && [ -n \"$TEAMAI_TEST_REPO_URL\" ]; then\n\
          \  echo \"Setting up auth for remote E2E tests...\"\n  echo \"machine git.woa.com\
          \ login oauth2 password $TEAMAI_TEST_TOKEN\" > ~/.netrc\n  chmod 600 ~/.netrc\n\
          \  echo Y | node dist/index.js init --repo \"$TEAMAI_TEST_REPO_URL\"\nfi\n"
        - npx vitest run --config vitest.e2e.config.ts
- stage: publish
  tasks:
  - task: publish
    cmds:
    - plugin: cmds
      params:
        cmds:
        - echo "=== Publish to tnpm ==="
        - "if [ \"$QCI_TRIGGER_TYPE\" != \"TRIGGER_TAG\" ]; then\n  echo \"⏭  Not a\
          \ tag build (trigger=$QCI_TRIGGER_TYPE), skipping publish\"\n  exit 0\n\
          fi\n"
        - "PKG_NAME=$(node -p \"require('./package.json').name\")\nPKG_VERSION=$(node\
          \ -p \"require('./package.json').version\")\nif npm view \"${PKG_NAME}@${PKG_VERSION}\"\
          \ version --registry http://r.tnpm.oa.com 2>/dev/null; then\n  echo \"ERROR:\
          \ ${PKG_NAME}@${PKG_VERSION} is already published.\"\n  exit 1\nfi\n"
        - echo "//r.tnpm.oa.com/:_authToken=${NPM_TOKEN}" > .npmrc
        - npm ci --ignore-scripts
        - npm run build
        - npm publish
        - rm -f .npmrc
trigger:
  branches:
    include:
    - master
  tags:
    include:
    - /^v\d+\.\d+\.\d+/
mr:
  branches:
    include:
    - master
  is_block_mr: 0
finally:
  failure:
    cmds:
    - plugin: cmds
      params:
        cmds:
        - echo "CI pipeline 失败!"
notifications:
- name: TeamAI CLI CI 通知
  channel: ENWECHAT
  group: QCI_JOB_ADMIN
  on_success: change
  on_failure: always
maximum_builds: 1
is_no_revert: 0
is_auto_cancel: 1
worker:
  label: JOB_MATRIX_DEVCLOUD
  tools: []
  language: node_js-22.19.0
